name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [umbrella, meic, earnings]
    defaults:
      run:
        working-directory: packages/${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # each package's src/_core at its pinned cherrypick-core SHA
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then
            pip install -e ".[dev]"
          else
            pip install -r requirements.txt -r requirements-dev.txt
          fi
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest)
        run: pytest
