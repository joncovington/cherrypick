[pytest]
testpaths = tests
python_files = test_*.py
markers =
    unit: fast, pure-function tests (no broker, no network, no OS scheduler) — the default CI lane
    live: touches the live broker or Dolt — opt-in, excluded from default CI
    windows: touches the Windows Task Scheduler (schtasks) — runs only on a Windows runner
addopts = -m "not live" -q
