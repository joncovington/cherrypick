[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cherrypick-streamer"
version = "0.1.0"
description = "Standalone DXLink market-data streamer daemon — the suite's canonical stream-cache producer"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.6"]

[tool.pytest.ini_options]
testpaths  = ["tests"]
pythonpath = ["tests", "src"]

[tool.ruff]
line-length = 110
target-version = "py311"
# src/_core is the cherrypick-core submodule — it carries its own ruff config; never lint it here.
extend-exclude = ["src/_core"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# config.py, daemon.py, and credentials.py bootstrap src/_core onto sys.path before importing
# cherrypick.core (deliberate, like MEIC/gex).
"src/config.py" = ["E402"]
"src/daemon.py" = ["E402"]
"src/credentials.py" = ["E402"]
"src/registry.py" = ["E402"]

[tool.hatch.build.targets.wheel]
only-include = ["src"]
sources = ["src"]
exclude = ["src/_core"]
