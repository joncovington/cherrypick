[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "meicagent"
version = "0.1.0"
description = "Autonomous 0DTE MEIC options trading agent"
requires-python = ">=3.11"
dependencies = [
    "tastytrade>=12.4.3",
    "keyring>=24",
    "python-dotenv>=1.0",
    "pytz>=2024",
    "flask>=3",
]

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-asyncio>=0.23", "ruff>=0.6"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths    = ["tests"]
pythonpath   = ["tests", "src"]

[tool.ruff]
line-length = 110
target-version = "py311"
# src/_core is the cherrypick-core submodule — it carries its own ruff config and CI; never lint it here.
extend-exclude = ["src/_core"]

[tool.ruff.lint]
# E/W pycodestyle, F pyflakes, I import-sorting, UP pyupgrade, B bugbear.
select = ["E", "F", "I", "W", "UP", "B"]
# E501 (line length) deferred: high churn, low value across existing live code.
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# The _core sys.path bootstrap deliberately runs before `import cherrypick.core` (see CUTOVER.md), so the
# imports below it are not at top of file by design.
"src/credentials.py" = ["E402"]

[tool.hatch.build.targets.wheel]
# Flat modules live under src/ and are imported top-level (pytest adds src to pythonpath); map the
# src/ prefix away so an editable install exposes them the same way. Exclude the _core submodule and
# tests from the built package.
only-include = ["src"]
sources = ["src"]
exclude = ["src/_core"]
