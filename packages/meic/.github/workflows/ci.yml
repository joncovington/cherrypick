name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Min supported (requires-python >=3.11) and current.
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          # Pull the cherrypit-core submodule at src/_core so imports resolve.
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        # `python -m pytest` (not bare `pytest`) puts the repo root on sys.path, matching local runs.
        run: python -m pytest
