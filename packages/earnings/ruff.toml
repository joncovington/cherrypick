# Ruff config (this repo has no pyproject.toml; pytest is configured in pytest.ini).
line-length = 110
target-version = "py310"
# src/_core is the cherrypit-core submodule — it carries its own ruff config and CI; never lint it here.
extend-exclude = ["src/_core"]

[lint]
# E/W pycodestyle, F pyflakes, I import-sorting, UP pyupgrade, B bugbear.
select = ["E", "F", "I", "W", "UP", "B"]
# E501 (line length) deferred: high churn, low value across existing live code.
ignore = ["E501"]

[lint.per-file-ignores]
# The _core sys.path bootstrap deliberately runs before `import cherrypit` (see CUTOVER.md), so the
# imports below it are not at top of file by design.
"src/credentials.py" = ["E402"]
