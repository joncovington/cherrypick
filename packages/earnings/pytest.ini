[pytest]
# Root config so a bare `pytest` (per README) is scoped to this repo's own tests and never descends
# into the cherrypit-core submodule at src/_core, which ships its own like-named test files
# (test_credentials.py / test_session.py) and would otherwise collide during collection.
testpaths = tests
norecursedirs = src/_core
addopts = --ignore=src/_core
